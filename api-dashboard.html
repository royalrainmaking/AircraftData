<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aircraft API Dashboard - Real-time Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .api-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-inactive { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 8px;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            background: var(--primary);
            transition: width 1s ease-in-out;
        }

        .loading {
            padding: 50px;
            text-align: center;
            font-style: italic;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Aircraft Live Data API</h1>
        <div class="api-status">● API Connected (Google Sheets)</div>
        <p>แสดงข้อมูลล่าสุดจากฐานข้อมูลโดยตรง</p>
    </div>

    <div class="container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>หมายเลขเครื่อง</th>
                    <th>ภารกิจ / ที่ตั้ง</th>
                    <th>สถานะ</th>
                    <th>ครบกำหนดซ่อม (A-Check)</th>
                    <th>ความคืบหน้า</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="5" class="loading">กำลังโหลดข้อมูลล่าสุด...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            // ใช้ OpenSheet เพื่อเลี่ยงการ Download ไฟล์
            const url = 'https://opensheet.elk.sh/1_M74Pe_4uul0fkcEea8AMxQIMcPznNZ9ttCqvbeQgBs/Log';
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // ข้อมูลชุดล่าสุดจะอยู่ที่แถวสุดท้ายของชีต Log
                const lastEntry = data[data.length - 1];
                const rawJson = lastEntry['JSON Data'] || lastEntry['1']; // ตรวจสอบชื่อคอลัมน์
                
                // ในชีตนี้ ข้อมูลถูกเก็บเป็น JSON String ในคอลัมน์ที่ 2
                let parsedData;
                try {
                    parsedData = JSON.parse(rawJson);
                } catch(e) {
                    // ถ้าพาร์สไม่ได้อาจจะเป็นเพราะโครงสร้าง OpenSheet ต่างออกไป ลองหาคอลัมน์อื่น
                    const firstKey = Object.keys(lastEntry)[1];
                    parsedData = JSON.parse(lastEntry[firstKey]);
                }

                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = '';

                // รวมข้อมูลเครื่องบินและเฮลิคอปเตอร์
                const allAircraft = [
                    ...(parsedData.ข้อมูลSheet1 || []),
                    ...(parsedData.ข้อมูลSheet2 || [])
                ];

                allAircraft.forEach(ac => {
                    const row = document.createElement('tr');
                    
                    const statusClass = ac.สภาพ === 'ใช้งานได้' ? 'badge-active' : 'badge-inactive';
                    const percent = parseInt(ac['เปอร์เซ็นต์ใช้งาน'] || ac['ชั่วโมงบินคงเหลือ A cHEcK'] || 0);

                    row.innerHTML = `
                        <td style="font-weight: 600;">${ac.เครื่อง || ac.หมายเลข || '-'}</td>
                        <td>${ac['ภารกิจ/ฐานที่ตั้ง'] || ac.ฐานที่ตั้ง || 'Bangkok'}</td>
                        <td><span class="badge ${statusClass}">${ac.สภาพ || 'ไม่ทราบสถานะ'}</span></td>
                        <td>${ac['ชั่วโมงบินคงเหลือ A cHEcK'] || '-'} ชม.</td>
                        <td>
                            <div style="font-size: 0.8rem; margin-bottom: 4px;">${ac['เปอร์เซ็นต์ใช้งาน'] || '0%'}</div>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${ac['เปอร์เซ็นต์ใช้งาน'] || '0%'}"></div>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>';
            }
        }

        loadData();
        // รีเฟรชข้อมูลทุก 5 นาที
        setInterval(loadData, 300000);
    </script>
</body>
</html>
